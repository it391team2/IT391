<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScannoKart</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body class="auth-page">

  <div class="brand-center">
    <div class="brand-logo">
      <img src="./ScannoKart.png" alt="ScannoKart App Preview" />
    </div>

    <h1 class="brand-title">ScannoKart</h1>

    <p class="brand-subtitle">
      Scan receipts. Track inventory. Never miss an expiration date.
    </p>
  </div>

  <div class="login-card">

    <div class="login-header">
      <span class="material-icons">lock</span>
      <div>
        <h2>Login</h2>
        <p>Access your household inventory dashboard</p>
      </div>
    </div>

    <form class="login-form" id="loginForm">

      <label>
        Email
        <div class="input-wrap">
          <span class="material-icons">mail</span>
          <input id="email" type="email" placeholder="example@gmail.com" required />
        </div>
      </label>

      <label>
        Password
        <div class="input-wrap">
          <span class="material-icons">key</span>
          <input id="password" type="password" placeholder="••••••••" required />
        </div>
      </label>

      <div class="login-row">
        <label class="checkbox">
          <input type="checkbox" />
          <span>Remember me</span>
        </label>
        <a class="link" href="#">Forgot password?</a>
      </div>

      <button type="submit" class="primary-btn">
        <span class="material-icons">login</span>
        Sign in
      </button>

      <div class="divider">
        <span>or</span>
      </div>

      <button class="secondary-btn" type="button" id="createAccountBtn">
        <span class="material-icons">person_add</span>
        Create account
      </button>

    </form>

  </div>

<script>
  const USERS_KEY = "sk_users";
  const CURRENT_KEY = "sk_current_user";

  function getUsers() {
    return JSON.parse(localStorage.getItem(USERS_KEY) || "[]");
  }

  function setUsers(users) {
    localStorage.setItem(USERS_KEY, JSON.stringify(users));
  }

  function initialsFromName(name) {
    const parts = name.trim().split(" ");
    if (parts.length === 1) {
      return parts[0].substring(0,2).toUpperCase();
    }
    return (parts[0][0] + parts[1][0]).toUpperCase();
  }

  document.getElementById("createAccountBtn").addEventListener("click", () => {

    const name = prompt("Enter your full name:");
    if (!name) return;

    const email = prompt("Enter your email:");
    if (!email) return;

    const password = prompt("Create a password:");
    if (!password) return;

    const users = getUsers();

    if (users.some(u => u.email === email)) {
      alert("Account already exists.");
      return;
    }

    const newUser = {
      name: name,
      email: email,
      password: password,
      initials: initialsFromName(name)
    };

    users.push(newUser);
    setUsers(users);

    localStorage.setItem(CURRENT_KEY, JSON.stringify(newUser));

    window.location.href = "dashboard.html";
  });

  document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const users = getUsers();

    const match = users.find(u => 
      u.email === email && u.password === password
    );

    if (!match) {
      alert("Invalid email or password");
      return;
    }

    localStorage.setItem(CURRENT_KEY, JSON.stringify(match));

    window.location.href = "dashboard.html";
  });
</script>

</body>
</html>
